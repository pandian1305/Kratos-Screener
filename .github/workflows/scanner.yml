name: Kratos Stock Screener

on:
  schedule:
    # Runs every 15 mins from 9:15 AM to 3:30 PM IST (3:45 AM to 10:00 AM UTC)
    # IST = UTC + 5:30
    - cron: '15,30,45 3 * * 1-5'   # 9:15, 9:30, 9:45 AM IST
    - cron: '0,15,30,45 4 * * 1-5'  # 9:30-10:15 AM IST
    - cron: '0,15,30,45 5 * * 1-5'  # 10:30-11:15 AM IST
    - cron: '0,15,30,45 6 * * 1-5'  # 11:30 AM-12:15 PM IST
    - cron: '0,15,30,45 7 * * 1-5'  # 12:30-1:15 PM IST
    - cron: '0,15,30,45 8 * * 1-5'  # 1:30-2:15 PM IST
    - cron: '0,15,30,45 9 * * 1-5'  # 2:30-3:15 PM IST
    - cron: '0 10 * * 1-5'          # 3:30 PM IST final scan
  workflow_dispatch:                 # Manual trigger button

jobs:
  scan:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install Dependencies
        run: pip install -r requirements.txt

      - name: Run Kratos Screener
        env:
          TELEGRAM_TOKEN:   ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          DISCORD_WEBHOOK:  ${{ secrets.DISCORD_WEBHOOK }}
        run: python scanner.py
